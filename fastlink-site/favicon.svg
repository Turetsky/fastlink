<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FastLink">
  <defs>
    <linearGradient id="flGrad" x1="14" y1="8" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5AE3C"/>
      <stop offset="1" stop-color="#F3A52C"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="16" fill="#232D3F"/>
